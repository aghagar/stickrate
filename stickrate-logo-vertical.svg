<svg
  xmlns="http://www.w3.org/2000/svg"
  width="90"
  height="56"
  viewBox="0 0 90 56"
  role="img"
  aria-label="StickRate">

  <!-- Bar 1: navy -->
  <rect x="13" y="9"  width="11" height="19" rx="5.5" fill="#1a2f3e"/>
  <!-- Bar 2: teal-mid -->
  <rect x="30" y="2"  width="11" height="26" rx="5.5" fill="#1a7a75"/>
  <!-- Bar 3: hero teal -->
  <rect x="47" y="0"  width="11" height="28" rx="5.5" fill="#009e8a"/>

  <!-- Wordmark -->
  <text
    x="45"
    y="48"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
    font-size="17"
    font-weight="700"
    letter-spacing="-0.04em"
    fill="#0f1e2c"
    text-anchor="middle">StickRate</text>
</svg>
